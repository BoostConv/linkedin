databases:
  - name: linkedin-db
    plan: free
    databaseName: linkedin_automation
    user: linkedin

services:
  - type: web
    name: linkedin-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkedin-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: linkedin-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://linkedin-ten-ruddy.vercel.app,http://localhost:3000"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: "claude-sonnet-4-20250514"
